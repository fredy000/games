<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Blob Wars Online</title>
<style>
body{margin:0;background:#0d0d1a;color:white;text-align:center;font-family:sans-serif}
canvas{background:#111;border:2px solid white;margin-top:20px}
button{margin:5px;padding:10px;border-radius:10px;border:none;cursor:pointer}
#ui{margin-top:10px}
</style>
</head>
<body>

<h1>💥 Blob Wars Online</h1>

<div id="ui">
  <button onclick="createRoom()">🎮 צור חדר</button>
  <button onclick="joinRoom()">🔑 הצטרף לחדר</button>
  <div id="room">Room: -</div>
</div>

<canvas id="game" width="800" height="400"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* 🔥 FIREBASE שלך */
const firebaseConfig = {
  apiKey: "AIzaSyA-gi3EIwLFcNS6MN6RGqs3L5UQsxTAbzk",
  authDomain: "ghost-a424e.firebaseapp.com",
  databaseURL: "https://ghost-a424e-default-rtdb.firebaseio.com",
  projectId: "ghost-a424e",
  storageBucket: "ghost-a424e.firebasestorage.app",
  messagingSenderId: "449116961300",
  appId: "1:449116961300:web:e3b20392eb17101e4cc501"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 🎮 GAME */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let players = [
  {x:100,y:200,color:"red"},
  {x:600,y:200,color:"green"}
];

let keys = {};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function update(){
  if(role==="p1"){
    if(keys["a"]) players[0].x-=3;
    if(keys["d"]) players[0].x+=3;
    if(keys["w"]) players[0].y-=3;
    if(keys["s"]) players[0].y+=3;
  }
  if(role==="p2"){
    if(keys["ArrowLeft"]) players[1].x-=3;
    if(keys["ArrowRight"]) players[1].x+=3;
    if(keys["ArrowUp"]) players[1].y-=3;
    if(keys["ArrowDown"]) players[1].y+=3;
  }

  sync();
}

function draw(){
  ctx.clearRect(0,0,800,400);

  players.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,20,0,Math.PI*2);
    ctx.fill();
  });
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

/* 🌐 MULTIPLAYER */
let roomId=null;
let role=null;

function code(){
  return Math.random().toString(36).slice(2,6).toUpperCase();
}

function updateUI(){
  document.getElementById("room").innerText="Room: "+(roomId||"-");
}

window.createRoom = async ()=>{
  roomId = code();
  role = "p1";
  updateUI();

  await set(ref(db,"rooms/"+roomId),{
    players:{
      p1:{x:100,y:200},
      p2:{x:600,y:200}
    }
  });

  listen();
  alert("קוד חדר: "+roomId);
};

window.joinRoom = async ()=>{
  const id = prompt("קוד חדר:");
  if(!id)return;

  const snap = await get(ref(db,"rooms/"+id));
  if(!snap.exists()){
    alert("לא קיים");
    return;
  }

  roomId=id;
  role="p2";
  updateUI();

  listen();
};

function listen(){
  onValue(ref(db,"rooms/"+roomId),(snap)=>{
    const data=snap.val();
    if(!data)return;

    players[0].x=data.players.p1.x;
    players[0].y=data.players.p1.y;

    players[1].x=data.players.p2.x;
    players[1].y=data.players.p2.y;
  });
}

function sync(){
  if(!roomId||!role)return;

  const me = role==="p1"?players[0]:players[1];

  update(ref(db,"rooms/"+roomId+"/players/"+role),{
    x:me.x,
    y:me.y
  });
}

</script>

</body>
</html>
