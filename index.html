<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔫 BLOB WARS — מולטיפלייר</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --p1: #FF4757;
    --p2: #2ED573;
    --bg: #1a1a2e;
    --panel: #16213e;
    --accent: #FFD700;
  }

  body {
    background: var(--bg);
    font-family: 'Fredoka One', cursive;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* Animated background stars */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px),
      radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 60px 60px, 30px 30px;
    background-position: 0 0, 15px 15px;
    pointer-events: none;
    z-index: 0;
  }

  #ui {
    width: 100%;
    max-width: 900px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    position: relative;
    z-index: 10;
  }

  .player-panel {
    background: var(--panel);
    border-radius: 20px;
    padding: 10px 20px;
    text-align: center;
    min-width: 160px;
    border: 3px solid;
    position: relative;
    overflow: hidden;
  }

  .player-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.08;
    background: currentColor;
  }

  #p1panel { border-color: var(--p1); color: var(--p1); }
  #p2panel { border-color: var(--p2); color: var(--p2); }

  .player-name {
    font-size: 18px;
    font-family: 'Fredoka One', cursive;
    letter-spacing: 1px;
  }

  .hearts { font-size: 22px; letter-spacing: 2px; margin: 4px 0; }

  .score {
    font-size: 28px;
    font-weight: 900;
    font-family: 'Fredoka One', cursive;
  }

  #center-ui {
    text-align: center;
    color: white;
  }

  #round-badge {
    background: var(--accent);
    color: #222;
    border-radius: 50px;
    padding: 4px 18px;
    font-size: 16px;
    display: inline-block;
    margin-bottom: 4px;
    font-family: 'Fredoka One', cursive;
  }

  #timer {
    font-size: 42px;
    color: white;
    line-height: 1;
    font-family: 'Fredoka One', cursive;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
  }

  #timer.urgent { color: #FF4757; animation: pulse 0.5s infinite alternate; }

  @keyframes pulse { to { transform: scale(1.1); } }

  #game-container {
    position: relative;
    z-index: 5;
  }

  canvas {
    display: block;
    border-radius: 16px;
    border: 3px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 60px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,0,0,0.3);
  }

  /* OVERLAY SCREENS */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,25,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(6px);
  }

  .overlay h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 64px;
    color: white;
    margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(255,215,0,0.6);
    animation: bounceIn 0.5s ease;
  }

  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .overlay p {
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.6;
  }

  .big-btn {
    background: linear-gradient(135deg, var(--accent), #FFA500);
    color: #222;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-size: 24px;
    font-family: 'Fredoka One', cursive;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 30px rgba(255,215,0,0.4);
    letter-spacing: 1px;
  }

  .big-btn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 12px 40px rgba(255,215,0,0.5); }
  .big-btn:active { transform: translateY(0) scale(0.98); }

  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin: 20px 0 30px;
  }

  .control-box {
    background: rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 16px 24px;
    border: 2px solid;
  }

  #ctrl1 { border-color: var(--p1); }
  #ctrl2 { border-color: var(--p2); }

  .control-box h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    margin-bottom: 10px;
  }

  #ctrl1 h3 { color: var(--p1); }
  #ctrl2 h3 { color: var(--p2); }

  .control-box p {
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    color: rgba(255,255,255,0.8);
    margin: 0;
    line-height: 1.8;
  }

  kbd {
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 1px 8px;
    font-family: monospace;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  #winner-screen .trophy { font-size: 80px; margin-bottom: 10px; animation: spin 1s ease; }
  @keyframes spin { from { transform: rotate(-20deg) scale(0); } to { transform: rotate(0) scale(1); } }

  #winner-name {
    font-size: 52px;
    font-family: 'Fredoka One', cursive;
    margin-bottom: 8px;
  }

  .sub-btns { display: flex; gap: 16px; margin-top: 16px; }

  .sec-btn {
    background: rgba(255,255,255,0.1);
    color: white;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 12px 32px;
    font-size: 18px;
    font-family: 'Fredoka One', cursive;
    cursor: pointer;
    transition: all 0.15s;
  }

  .sec-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }

  /* Score history */
  .score-history {
    display: flex;
    gap: 10px;
    margin: 12px 0;
  }

  .round-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }

  /* Damage flash overlay */
  #flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
    opacity: 0;
  }

  /* Combo text */
  #combo-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Fredoka One', cursive;
    font-size: 56px;
    pointer-events: none;
    z-index: 300;
    opacity: 0;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<div id="flash"></div>
<div id="combo-text"></div>

<!-- START SCREEN -->
<div class="overlay" id="start-screen">
  <h1>💥 BLOB WARS 💥</h1>
  <p>מולטיפלייר מקומי — שני שחקנים, מקלדת אחת!<br>פוצצו את הבלוב השני לפני שהוא פוצץ אתכם 🔫</p>
  <div class="controls-grid">
    <div class="control-box" id="ctrl1">
      <h3>🔴 שחקן 1</h3>
      <p>
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> — תנועה<br>
        <kbd>Space</kbd> — ירי
      </p>
    </div>
    <div class="control-box" id="ctrl2">
      <h3>🟢 שחקן 2</h3>
      <p>
        <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> — תנועה<br>
        <kbd>Enter</kbd> — ירי
      </p>
    </div>
  </div>
  <button class="big-btn" onclick="startGame()">🎮 בואו נשחק!</button>
  <p style="margin-top:16px;font-size:14px;color:rgba(255,255,255,0.4)">מי שמגיע ראשון ל-5 ניצחונות מנצח!</p>
</div>

<!-- WINNER SCREEN -->
<div class="overlay" id="winner-screen" style="display:none">
  <div class="trophy">🏆</div>
  <div id="winner-name">שחקן 1</div>
  <p id="winner-sub">ניצח את הסיבוב!</p>
  <div class="sub-btns">
    <button class="sec-btn" onclick="nextRound()">הסיבוב הבא ▶</button>
    <button class="big-btn" onclick="resetAll()">🔄 התחל מחדש</button>
  </div>
</div>

<!-- FINAL WINNER -->
<div class="overlay" id="final-screen" style="display:none">
  <div class="trophy" style="font-size:100px">🎉</div>
  <h1 id="final-winner-name" style="font-size:72px"></h1>
  <p style="font-size:22px">ניצח את המשחק!</p>
  <button class="big-btn" onclick="resetAll()" style="margin-top:20px">🔄 משחק חדש</button>
</div>

<!-- UI -->
<div id="ui">
  <div class="player-panel" id="p1panel">
    <div class="player-name">🔴 שחקן 1</div>
    <div class="hearts" id="p1hearts">❤️❤️❤️</div>
    <div class="score" id="p1score">0</div>
  </div>

  <div id="center-ui">
    <div id="round-badge">סיבוב 1</div>
    <div id="timer">60</div>
  </div>

  <div class="player-panel" id="p2panel">
    <div class="player-name">🟢 שחקן 2</div>
    <div class="hearts" id="p2hearts">❤️❤️❤️</div>
    <div class="score" id="p2score">0</div>
  </div>
</div>

<div id="game-container">
  <canvas id="c" width="860" height="520"></canvas>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Game state
let gameRunning = false;
let round = 1;
let scores = [0, 0];
let roundTime = 60;
let timerInterval = null;
let particles = [];
let powerups = [];
let lastPowerup = 0;
let animFrame;

// Platforms
const platforms = [
  { x: 0, y: H - 30, w: W, h: 30 },         // Floor
  { x: 100, y: 380, w: 180, h: 18 },
  { x: 580, y: 380, w: 180, h: 18 },
  { x: 330, y: 300, w: 200, h: 18 },
  { x: 60, y: 220, w: 150, h: 18 },
  { x: 650, y: 220, w: 150, h: 18 },
  { x: 320, y: 170, w: 220, h: 18 },
];

// Players
function createPlayer(x, color, keys, bulletColor, side) {
  return {
    x, y: 200, w: 38, h: 38,
    vx: 0, vy: 0,
    color, bulletColor,
    hp: 3, maxHp: 3,
    keys, side,
    onGround: false,
    canJump: false,
    jumpHeld: false,
    lastShot: 0,
    shotCooldown: 350,
    invincible: 0,
    facing: side === 0 ? 1 : -1,
    blinking: 0,
    wobble: 0,
    powerup: null,
    powerupTime: 0,
    ammo: -1, // -1 = infinite normal
    kills: 0,
  };
}

const players = [
  createPlayer(120, '#FF4757', { left:'a', right:'d', up:'w', shoot:' ' }, '#FF6B81', 0),
  createPlayer(W - 160, '#2ED573', { left:'ArrowLeft', right:'ArrowRight', up:'ArrowUp', shoot:'Enter' }, '#7BED9F', 1),
];

let bullets = [];
let keys = {};

// Key listeners
document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key] = true;

  if (!gameRunning) return;

  players.forEach((p, i) => {
    if (e.key === p.keys.shoot) {
      shoot(p, i);
    }
  });
});

document.addEventListener('keyup', e => {
  keys[e.key] = false;
  players.forEach(p => {
    if (e.key === p.keys.up) p.jumpHeld = false;
  });
});

function shoot(p, idx) {
  const now = Date.now();
  const cd = p.powerup === 'rapid' ? 120 : p.shotCooldown;
  if (now - p.lastShot < cd) return;
  p.lastShot = now;

  const bCount = p.powerup === 'spread' ? 3 : 1;
  const angles = p.powerup === 'spread' ? [-0.25, 0, 0.25] : [0];
  const speed = p.powerup === 'rapid' ? 11 : 9;
  const size = p.powerup === 'big' ? 14 : 8;

  angles.forEach((angle, ai) => {
    const baseVx = p.facing * speed;
    const vx = baseVx * Math.cos(angle) - Math.sin(angle) * 2;
    const vy = baseVx * Math.sin(angle) + Math.cos(angle) * 0;
    bullets.push({
      x: p.x + p.w/2 + p.facing * 20,
      y: p.y + p.h/2,
      vx, vy: vy * p.facing,
      owner: idx,
      color: p.bulletColor,
      r: size,
      trail: [],
      age: 0,
    });
  });

  // Muzzle flash particle
  for (let i = 0; i < 5; i++) {
    spawnParticle(
      p.x + p.w/2 + p.facing*22, p.y + p.h/2,
      (Math.random()-0.5)*3 + p.facing*3,
      (Math.random()-0.5)*3,
      p.bulletColor, 3+Math.random()*5, 20
    );
  }

  // Recoil
  p.vx -= p.facing * 1.5;
  p.wobble = 8;

  // Sound (Web Audio)
  playSound(idx);
}

// Simple Web Audio effects
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    if (type === 0 || type === 1) { // shoot
      osc.frequency.setValueAtTime(600 + type * 200, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
    } else if (type === 'hit') {
      osc.frequency.setValueAtTime(200, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, ac.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
    } else if (type === 'powerup') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, ac.currentTime);
      osc.frequency.linearRampToValueAtTime(880, ac.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
    }
    osc.start();
    osc.stop(ac.currentTime + 0.3);
  } catch(e) {}
}

function spawnParticle(x, y, vx, vy, color, r, life) {
  particles.push({ x, y, vx, vy, color, r, life, maxLife: life });
}

function spawnExplosion(x, y, color, count=20) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    spawnParticle(x, y,
      Math.cos(angle)*speed, Math.sin(angle)*speed,
      color, 3+Math.random()*8, 40+Math.random()*40);
  }
  // Stars
  for (let i = 0; i < 8; i++) {
    const angle = Math.random()*Math.PI*2;
    spawnParticle(x, y,
      Math.cos(angle)*(4+Math.random()*4), Math.sin(angle)*(4+Math.random()*4),
      '#FFD700', 2+Math.random()*4, 30+Math.random()*30);
  }
}

function spawnPowerup() {
  const types = ['rapid','spread','big','shield'];
  const type = types[Math.floor(Math.random()*types.length)];
  const plat = platforms[1 + Math.floor(Math.random()*(platforms.length-1))];
  powerups.push({
    x: plat.x + plat.w/2,
    y: plat.y - 20,
    type,
    bob: Math.random()*Math.PI*2,
    r: 16,
  });
}

function onPlatform(p, plat) {
  return p.x + p.w > plat.x + 5 &&
         p.x < plat.x + plat.w - 5 &&
         p.y + p.h >= plat.y &&
         p.y + p.h <= plat.y + 20 &&
         p.vy >= 0;
}

function update() {
  if (!gameRunning) return;

  const now = Date.now();
  const dt = 1;
  const gravity = 0.55;
  const speed = 4.5;
  const jumpPower = -13;
  const friction = 0.82;

  // Spawn powerup every 8 seconds
  if (now - lastPowerup > 8000 && powerups.length < 2) {
    spawnPowerup();
    lastPowerup = now;
  }

  players.forEach((p, i) => {
    if (p.hp <= 0) return;

    // Invincibility
    if (p.invincible > 0) p.invincible--;
    if (p.powerupTime > 0) {
      p.powerupTime--;
      if (p.powerupTime <= 0) p.powerup = null;
    }
    if (p.wobble > 0) p.wobble--;

    // Input
    const movLeft = keys[p.keys.left];
    const movRight = keys[p.keys.right];
    const jump = keys[p.keys.up];

    if (movLeft) { p.vx -= 1.2; p.facing = -1; }
    if (movRight) { p.vx += 1.2; p.facing = 1; }

    // Jump
    if (jump && p.canJump && !p.jumpHeld) {
      p.vy = jumpPower;
      p.canJump = false;
      p.jumpHeld = true;
      // Jump particles
      for (let j = 0; j < 6; j++) {
        spawnParticle(p.x+p.w/2, p.y+p.h,
          (Math.random()-0.5)*4, Math.random()*3,
          p.color, 3+Math.random()*5, 20);
      }
    }
    if (!jump) p.jumpHeld = false;

    // Clamp velocity
    p.vx = Math.max(-speed*1.5, Math.min(speed*1.5, p.vx));

    // Apply gravity
    p.vy += gravity;
    p.vx *= friction;

    // Move
    p.x += p.vx;
    p.y += p.vy;

    // Platform collision
    p.onGround = false;
    p.canJump = false;
    platforms.forEach(plat => {
      if (onPlatform(p, plat)) {
        p.y = plat.y - p.h;
        p.vy = 0;
        p.onGround = true;
        p.canJump = true;
      }
    });

    // Wall bounce
    if (p.x < 0) { p.x = 0; p.vx = Math.abs(p.vx) * 0.5; }
    if (p.x + p.w > W) { p.x = W - p.w; p.vx = -Math.abs(p.vx) * 0.5; }

    // Fell off bottom
    if (p.y > H + 50) {
      p.y = 100;
      p.x = i === 0 ? 120 : W - 160;
      p.vy = 0;
      p.vx = 0;
      takeDamage(p, i, 1);
    }

    // Pickup powerups
    powerups.forEach((pu, pi) => {
      const dx = p.x + p.w/2 - pu.x;
      const dy = p.y + p.h/2 - pu.y;
      if (Math.sqrt(dx*dx + dy*dy) < pu.r + 20) {
        p.powerup = pu.type;
        p.powerupTime = 300;
        spawnExplosion(pu.x, pu.y, '#FFD700', 15);
        playSound('powerup');
        showCombo(powerupEmoji(pu.type) + ' ' + powerupName(pu.type) + '!', p.color);
        powerups.splice(pi, 1);
      }
    });
  });

  // Bullets
  bullets.forEach((b, bi) => {
    b.trail.push({x: b.x, y: b.y});
    if (b.trail.length > 8) b.trail.shift();

    b.x += b.vx;
    b.y += b.vy;
    b.age++;

    // Wall bounce
    if (b.x < b.r) { b.x = b.r; b.vx = Math.abs(b.vx); }
    if (b.x > W - b.r) { b.x = W - b.r; b.vx = -Math.abs(b.vx); }

    // Platform collision
    platforms.forEach(plat => {
      if (b.x > plat.x && b.x < plat.x + plat.w &&
          b.y + b.r > plat.y && b.y - b.r < plat.y + plat.h) {
        spawnExplosion(b.x, b.y, b.color, 8);
        bullets.splice(bi, 1);
      }
    });

    // Age out
    if (b.age > 120) {
      spawnParticle(b.x, b.y, 0, 0, b.color, b.r, 15);
      bullets.splice(bi, 1);
      return;
    }

    // Hit players
    players.forEach((p, pi) => {
      if (pi === b.owner || p.hp <= 0 || p.invincible > 0 || p.powerup === 'shield') return;
      const dx = p.x + p.w/2 - b.x;
      const dy = p.y + p.h/2 - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < p.w/2 + b.r - 4) {
        spawnExplosion(b.x, b.y, b.color, 18);
        playSound('hit');
        takeDamage(p, pi, 1);
        players[b.owner].kills++;
        bullets.splice(bi, 1);
        // Knockback
        const nx = -dx / dist, ny = -dy / dist;
        p.vx += nx * -8;
        p.vy += ny * -8;
      }
    });
  });

  // Particles
  particles.forEach((pt, pi) => {
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.vy += 0.15;
    pt.vx *= 0.96;
    pt.life--;
    if (pt.life <= 0) particles.splice(pi, 1);
  });

  // Powerup bob
  powerups.forEach(pu => { pu.bob += 0.05; });
}

function takeDamage(p, pi, amount) {
  p.hp -= amount;
  p.invincible = 90;
  p.wobble = 15;

  // Flash screen
  const flash = document.getElementById('flash');
  flash.style.background = p.color;
  flash.style.opacity = '0.2';
  setTimeout(() => { flash.style.opacity = '0'; }, 120);

  updateHUD();
  if (p.hp <= 0) {
    // Player died
    spawnExplosion(p.x+p.w/2, p.y+p.h/2, p.color, 40);
    setTimeout(() => endRound(), 600);
  }
}

function endRound() {
  gameRunning = false;
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrame);

  // Find winner (alive or more hp)
  let winner = -1;
  if (players[0].hp <= 0 && players[1].hp > 0) winner = 1;
  else if (players[1].hp <= 0 && players[0].hp > 0) winner = 0;
  else {
    // Timer ran out - more hp wins
    winner = players[0].hp > players[1].hp ? 0 : (players[1].hp > players[0].hp ? 1 : -1);
  }

  if (winner >= 0) {
    scores[winner]++;
    document.getElementById('p1score').textContent = scores[0];
    document.getElementById('p2score').textContent = scores[1];
  }

  // Check if game over
  if (scores[0] >= 5 || scores[1] >= 5) {
    const fw = scores[0] >= 5 ? 0 : 1;
    document.getElementById('final-winner-name').textContent =
      (fw === 0 ? '🔴 שחקן 1' : '🟢 שחקן 2') + ' 🎉';
    document.getElementById('final-winner-name').style.color =
      fw === 0 ? '#FF4757' : '#2ED573';
    document.getElementById('final-screen').style.display = 'flex';
    return;
  }

  const ws = document.getElementById('winner-screen');
  ws.style.display = 'flex';
  const wn = document.getElementById('winner-name');
  const wsub = document.getElementById('winner-sub');
  if (winner === -1) {
    wn.textContent = '🤝 תיקו!';
    wn.style.color = '#FFD700';
    wsub.textContent = `תוצאה: ${scores[0]} — ${scores[1]}`;
  } else {
    wn.textContent = (winner === 0 ? '🔴 שחקן 1' : '🟢 שחקן 2') + ' ניצח!';
    wn.style.color = winner === 0 ? '#FF4757' : '#2ED573';
    wsub.textContent = `תוצאה: ${scores[0]} — ${scores[1]} | עוד ${5 - scores[winner]} לניצחון!`;
  }
}

function nextRound() {
  document.getElementById('winner-screen').style.display = 'none';
  round++;
  document.getElementById('round-badge').textContent = `סיבוב ${round}`;
  initRound();
}

function resetAll() {
  scores = [0, 0];
  round = 1;
  document.getElementById('p1score').textContent = '0';
  document.getElementById('p2score').textContent = '0';
  document.getElementById('round-badge').textContent = 'סיבוב 1';
  document.getElementById('winner-screen').style.display = 'none';
  document.getElementById('final-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
}

function initRound() {
  // Reset players
  players[0].x = 120; players[0].y = 200;
  players[1].x = W-160; players[1].y = 200;
  players.forEach(p => {
    p.hp = p.maxHp;
    p.vx = 0; p.vy = 0;
    p.invincible = 0;
    p.powerup = null;
    p.powerupTime = 0;
    p.kills = 0;
  });
  bullets = [];
  particles = [];
  powerups = [];
  lastPowerup = Date.now();
  roundTime = 60;

  updateHUD();

  // Timer
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    roundTime--;
    const timerEl = document.getElementById('timer');
    timerEl.textContent = roundTime;
    timerEl.classList.toggle('urgent', roundTime <= 10);
    if (roundTime <= 0) endRound();
  }, 1000);
  document.getElementById('timer').textContent = '60';
  document.getElementById('timer').classList.remove('urgent');

  gameRunning = true;
  gameLoop();
}

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  initRound();
}

function updateHUD() {
  const hearts = ['', '❤️', '❤️❤️', '❤️❤️❤️'];
  const lost1 = ['💔', '💔❤️', '💔❤️❤️', '💔❤️❤️❤️'];
  players.forEach((p, i) => {
    const hp = Math.max(0, Math.min(3, p.hp));
    const h = '❤️'.repeat(hp) + (hp < 3 ? '' : '');
    document.getElementById(`p${i+1}hearts`).textContent = h || '💔';
  });
}

function showCombo(text, color) {
  const el = document.getElementById('combo-text');
  el.textContent = text;
  el.style.color = color;
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%,-50%) scale(1.2)';
  clearTimeout(el._t);
  el._t = setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%,-50%) scale(1)';
  }, 1200);
}

function powerupEmoji(type) {
  return { rapid:'⚡', spread:'🌟', big:'💣', shield:'🛡️' }[type] || '⭐';
}
function powerupName(type) {
  return { rapid:'ירי מהיר', spread:'ספריי', big:'כדורים ענקיים', shield:'מגן' }[type] || '';
}

// Colors
const PLATFORM_COLORS = ['#2C3E50','#1a252f'];
const BG_GRADIENT = ctx.createLinearGradient(0,0,0,H);
BG_GRADIENT.addColorStop(0, '#1a1a2e');
BG_GRADIENT.addColorStop(1, '#16213e');

function draw() {
  // Background
  ctx.fillStyle = BG_GRADIENT;
  ctx.fillRect(0,0,W,H);

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Platforms
  platforms.forEach((plat, i) => {
    const isFloor = i === 0;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.roundRect(plat.x+4, plat.y+4, plat.w, plat.h, isFloor?0:10);
    ctx.fill();
    // Platform
    const g = ctx.createLinearGradient(0, plat.y, 0, plat.y + plat.h);
    g.addColorStop(0, isFloor ? '#2C3E50' : '#34495E');
    g.addColorStop(1, isFloor ? '#1a252f' : '#2C3E50');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(plat.x, plat.y, plat.w, plat.h, isFloor?0:10);
    ctx.fill();
    // Top highlight
    ctx.fillStyle = isFloor ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.roundRect(plat.x, plat.y, plat.w, 4, isFloor?0:[4,4,0,0]);
    ctx.fill();
  });

  // Powerups
  powerups.forEach(pu => {
    const bobY = Math.sin(pu.bob) * 6;
    const colors = { rapid:'#FFD700', spread:'#FF6B81', big:'#A29BFE', shield:'#74B9FF' };
    const col = colors[pu.type] || '#FFD700';

    // Glow
    ctx.shadowColor = col;
    ctx.shadowBlur = 20;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(pu.x, pu.y + bobY, pu.r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Icon
    ctx.font = '18px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(powerupEmoji(pu.type), pu.x, pu.y + bobY);
  });

  // Particles
  particles.forEach(pt => {
    const alpha = pt.life / pt.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, pt.r * alpha, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Bullet trails
  bullets.forEach(b => {
    b.trail.forEach((t, ti) => {
      const alpha = (ti / b.trail.length) * 0.5;
      const r = b.r * (ti / b.trail.length) * 0.8;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Bullet
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 15;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
    // White core
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * 0.4, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Players
  players.forEach((p, i) => {
    if (p.hp <= 0) return;

    // Blink when invincible
    if (p.invincible > 0 && Math.floor(p.invincible / 6) % 2 === 0) return;

    const cx = p.x + p.w/2;
    const cy = p.y + p.h/2;
    const wobble = Math.sin(p.wobble * 0.8) * (p.wobble > 0 ? 4 : 0);
    const squish = p.onGround ? 1.1 : (p.vy < -5 ? 0.8 : 1);

    ctx.save();
    ctx.translate(cx + wobble, cy);
    ctx.scale(squish, 1/squish);

    // Shield effect
    if (p.powerup === 'shield') {
      ctx.shadowColor = '#74B9FF';
      ctx.shadowBlur = 25;
      ctx.strokeStyle = 'rgba(116, 185, 255, 0.6)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, p.w/2 + 10, 0, Math.PI*2);
      ctx.stroke();
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, p.h/2 + 2, p.w*0.5*squish, 5, 0, 0, Math.PI*2);
    ctx.fill();

    // Body glow
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 20;

    // Body
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(0, 0, p.w/2, 0, Math.PI*2);
    ctx.fill();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(-p.w*0.15, -p.w*0.15, p.w*0.2, 0, Math.PI*2);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Eyes
    const eyeX = p.facing * 8;
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.arc(eyeX - 5, -4, 5, 0, Math.PI*2);
    ctx.arc(eyeX + 5, -4, 5, 0, Math.PI*2);
    ctx.fill();

    // Pupils
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(eyeX - 5 + p.facing, -4, 2.5, 0, Math.PI*2);
    ctx.arc(eyeX + 5 + p.facing, -4, 2.5, 0, Math.PI*2);
    ctx.fill();

    // Mouth (smile or o-face when shooting)
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    const mouthOpen = Date.now() - p.lastShot < 150;
    if (mouthOpen) {
      ctx.beginPath();
      ctx.arc(eyeX, 5, 5, 0, Math.PI*2);
      ctx.fillStyle = '#1a1a2e';
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(eyeX, 3, 6, 0.2, Math.PI-0.2);
      ctx.stroke();
    }

    // Powerup indicator
    if (p.powerup) {
      ctx.font = '14px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 5;
      ctx.fillText(powerupEmoji(p.powerup), 0, -p.h/2 - 14);
      ctx.shadowBlur = 0;
    }

    ctx.restore();

    // HP bar
    const barW = p.w + 10;
    const barX = p.x - 5;
    const barY = p.y - 12;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, 5, 3);
    ctx.fill();
    const hpFrac = p.hp / p.maxHp;
    const hpCol = hpFrac > 0.6 ? '#2ED573' : hpFrac > 0.3 ? '#FFD700' : '#FF4757';
    ctx.fillStyle = hpCol;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW * hpFrac, 5, 3);
    ctx.fill();
  });
}

function gameLoop() {
  if (!gameRunning) return;
  update();
  draw();
  animFrame = requestAnimationFrame(gameLoop);
}

// Draw static start screen background
function drawStartBg() {
  ctx.fillStyle = BG_GRADIENT;
  ctx.fillRect(0,0,W,H);
  platforms.forEach((plat, i) => {
    ctx.fillStyle = i === 0 ? '#2C3E50' : '#34495E';
    ctx.beginPath();
    ctx.roundRect(plat.x, plat.y, plat.w, plat.h, i===0?0:10);
    ctx.fill();
  });
  // Preview blobs
  [[120,350,'#FF4757'],[W-160,280,'#2ED573']].forEach(([x,y,c]) => {
    ctx.shadowColor = c; ctx.shadowBlur = 20;
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(x+19,y+19,19,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  });
}
drawStartBg();
updateHUD();
</script>
