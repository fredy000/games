<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BOUT — Online Boxing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══════════════ LOBBY ══════════════ -->
<div id="screen-lobby" class="screen active">
  <div class="lobby-bg"></div>
  <div class="lobby-content">
    <div class="logo-wrap">
      <h1 class="logo">BOUT</h1>
      <div class="logo-sub">ONLINE BOXING ENGINE</div>
    </div>

    <div class="lobby-card">
      <input id="name-input" class="name-input" type="text"
             placeholder="ENTER YOUR NAME" maxlength="14" autocomplete="off"/>

      <div class="lobby-actions">
        <button class="btn btn-primary" id="btn-create">CREATE ROOM</button>
        <div class="or-divider"><span>OR</span></div>
        <div class="join-row">
          <input id="room-input" class="room-input" type="text"
                 placeholder="ROOM CODE" maxlength="6" autocomplete="off"/>
          <button class="btn btn-secondary" id="btn-join">JOIN</button>
        </div>
      </div>

      <div id="lobby-msg" class="lobby-msg"></div>
    </div>

    <div class="controls-hint">
      <span>J JAB</span><span>K CROSS</span><span>L HOOK</span>
      <span>A/D DODGE</span><span>SPACE BLOCK / PARRY</span>
    </div>
  </div>
</div>

<!-- ══════════════ WAITING ROOM ══════════════ -->
<div id="screen-waiting" class="screen">
  <div class="waiting-content">
    <div class="waiting-title">ROOM CODE</div>
    <div id="room-code-display" class="room-code-big"></div>
    <div class="waiting-sub">Share this code with your opponent</div>
    <div id="waiting-status" class="waiting-status">
      <span class="dot-pulse"></span> Waiting for opponent...
    </div>
    <button class="btn btn-ghost" id="btn-copy-code">COPY CODE</button>
  </div>
</div>

<!-- ══════════════ GAME ══════════════ -->
<div id="screen-game" class="screen">

  <!-- HUD -->
  <div id="hud">
    <div class="fighter-hud left" id="hud-p1">
      <div class="fighter-name" id="hud-p1-name">PLAYER 1</div>
      <div class="hp-track"><div class="hp-bar" id="p1-hp-bar"></div></div>
      <div class="bar-label">HP</div>
      <div class="stam-track"><div class="stam-bar" id="p1-stam-bar"></div></div>
      <div class="bar-label">STAMINA</div>
    </div>

    <div id="center-hud">
      <div id="round-display">RND 1</div>
      <div id="timer-display">60</div>
    </div>

    <div class="fighter-hud right" id="hud-p2">
      <div class="fighter-name" id="hud-p2-name">PLAYER 2</div>
      <div class="hp-track"><div class="hp-bar" id="p2-hp-bar"></div></div>
      <div class="bar-label">HP</div>
      <div class="stam-track"><div class="stam-bar" id="p2-stam-bar"></div></div>
      <div class="bar-label">STAMINA</div>
    </div>
  </div>

  <!-- Arena -->
  <div id="arena">
    <div id="spotlight"></div>
    <canvas id="ring-canvas"></canvas>
    <div id="ring-floor"></div>

    <!-- Fighters -->
    <div class="fighter-container" id="p1-container">
      <svg class="fighter-svg" viewBox="0 0 90 140">
        <g fill="#c8d4f0" opacity="0.92">
          <ellipse cx="45" cy="16" rx="12" ry="13"/>
          <rect x="41" y="27" width="8" height="7" rx="2"/>
          <rect x="30" y="33" width="30" height="34" rx="6"/>
          <rect x="18" y="33" width="13" height="36" rx="5" id="p1-larm"/>
          <rect x="59" y="33" width="13" height="36" rx="5" id="p1-rarm"/>
          <ellipse cx="24" cy="71" rx="9" ry="7" fill="#e8f04a"/>
          <ellipse cx="65" cy="71" rx="9" ry="7" fill="#e8f04a"/>
          <rect x="29" y="64" width="32" height="22" rx="4" fill="#2244aa" opacity="0.85"/>
          <rect x="30" y="83" width="13" height="38" rx="5"/>
          <rect x="47" y="83" width="13" height="38" rx="5"/>
          <rect x="27" y="116" width="18" height="10" rx="4" fill="#111122"/>
          <rect x="44" y="116" width="18" height="10" rx="4" fill="#111122"/>
        </g>
        <ellipse cx="40" cy="15" rx="3" ry="3.5" fill="#0a0a0f" opacity="0.7"/>
        <ellipse cx="50" cy="15" rx="3" ry="3.5" fill="#0a0a0f" opacity="0.7"/>
        <ellipse id="p1-guard-vis" cx="45" cy="58" rx="20" ry="22"
                 fill="#4af0b0" opacity="0" stroke="#4af0b0" stroke-width="2"/>
      </svg>
      <div class="fighter-shadow"></div>
    </div>

    <div class="fighter-container" id="p2-container">
      <svg class="fighter-svg" viewBox="0 0 90 140" style="transform:scaleX(-1)">
        <g fill="#f0c8c8" opacity="0.92">
          <ellipse cx="45" cy="16" rx="12" ry="13"/>
          <rect x="41" y="27" width="8" height="7" rx="2"/>
          <rect x="30" y="33" width="30" height="34" rx="6"/>
          <rect x="18" y="33" width="13" height="36" rx="5"/>
          <rect x="59" y="33" width="13" height="36" rx="5"/>
          <ellipse cx="24" cy="71" rx="9" ry="7" fill="#f04a4a"/>
          <ellipse cx="65" cy="71" rx="9" ry="7" fill="#f04a4a"/>
          <rect x="29" y="64" width="32" height="22" rx="4" fill="#8b1a1a" opacity="0.85"/>
          <rect x="30" y="83" width="13" height="38" rx="5"/>
          <rect x="47" y="83" width="13" height="38" rx="5"/>
          <rect x="27" y="116" width="18" height="10" rx="4" fill="#1a0808"/>
          <rect x="44" y="116" width="18" height="10" rx="4" fill="#1a0808"/>
        </g>
        <ellipse cx="40" cy="15" rx="3" ry="3.5" fill="#0a0a0f" opacity="0.7"/>
        <ellipse cx="50" cy="15" rx="3" ry="3.5" fill="#0a0a0f" opacity="0.7"/>
        <ellipse id="p2-guard-vis" cx="45" cy="58" rx="20" ry="22"
                 fill="#4af0b0" opacity="0" stroke="#4af0b0" stroke-width="2"/>
      </svg>
      <div class="fighter-shadow"></div>
    </div>

    <!-- FX layers -->
    <div class="hit-flash" id="hit-flash-l"></div>
    <div class="hit-flash" id="hit-flash-r"></div>
    <div id="combo-display"></div>
    <div id="status-line"></div>
    <div id="ping-display">-- ms</div>
  </div>

  <!-- Mobile / on-screen controls -->
  <div id="controls-panel">
    <div class="ctrl-group">
      <span class="ctrl-label">MOVE</span>
      <button class="ctrl-key" data-key="a">A</button>
      <button class="ctrl-key" data-key="d">D</button>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">JAB</span>
      <button class="ctrl-key" data-key="j">J</button>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">CROSS</span>
      <button class="ctrl-key" data-key="k">K</button>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">HOOK</span>
      <button class="ctrl-key" data-key="l">L</button>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">BLOCK</span>
      <button class="ctrl-key wide" data-key=" "
              onmousedown="game.handleKeyDown(' ')"
              onmouseup="game.handleKeyUp(' ')"
              ontouchstart="game.handleKeyDown(' ')"
              ontouchend="game.handleKeyUp(' ')">BLOCK</button>
    </div>
  </div>
</div>

<!-- ══════════════ RESULT ══════════════ -->
<div id="screen-result" class="screen">
  <div class="result-content">
    <div id="result-title" class="result-title"></div>
    <div id="result-sub" class="result-sub"></div>
    <div id="result-stats" class="result-stats"></div>
    <button class="btn btn-primary" id="btn-rematch">REMATCH</button>
    <button class="btn btn-ghost" id="btn-lobby">BACK TO LOBBY</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module" src="firebase.js"></script>
</body>
</html>
